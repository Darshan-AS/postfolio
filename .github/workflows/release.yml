name: App Release Pipeline

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0
  workflow_dispatch: # Allows manual triggering

# REQUIRED: Give the GITHUB_TOKEN write access to create releases
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, Release, and Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Universal APK (for Firebase)
        # Generates a single APK that works on all devices for beta testers
        run: flutter build apk --release

      - name: Build Split APKs (for GitHub Release)
        # Generates per-architecture APKs to keep download sizes small on GitHub
        run: flutter build apk --split-per-abi --release

      - name: Generate Release Notes
        # We generate the release notes first so Firebase can use them
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Release Notes to File
        env:
          CHANGELOG: ${{ steps.release_notes.outputs.changelog }}
        run: echo "$CHANGELOG" > release-notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          # We pass the generated changelog file directly to Firebase
          releaseNotesFile: release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/app-*.apk
          # We pass the EXACT same changelog to GitHub Releases
          body: ${{ steps.release_notes.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
